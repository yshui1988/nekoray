name: Build Nekoray (AnyTLS Hardcore Edition)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Qt 5.15.2
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      - name: Setup MSVC & Ninja
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja
        run: choco install ninja
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Python Injector (AnyTLS Surgery)
        env:
          PYTHONIOENCODING: utf8
        run: |
          python inject_anytls.py

      - name: Build C++ Dependencies
        shell: bash
        run: |
          bash ./libs/build_deps_all.sh

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.20'

      - name: Build Go Components
        shell: bash
        run: |
          if [ -f "./libs/get_source.sh" ]; then bash ./libs/get_source.sh; fi
          if [ -f "./libs/build_go.sh" ]; then GOOS=windows GOARCH=amd64 bash ./libs/build_go.sh; fi

      - name: Inject 2026 Latest Sing-box Core
        shell: pwsh
        run: |
          $api_url = "https://api.github.com/repos/SagerNet/sing-box/releases/latest"
          $tag = (Invoke-RestMethod -Uri $api_url).tag_name
          $ver = $tag.TrimStart('v')
          $dl_url = "https://github.com/SagerNet/sing-box/releases/download/$tag/sing-box-$ver-windows-amd64.zip"
          Invoke-WebRequest -Uri $dl_url -OutFile "core.zip"
          Expand-Archive -Path "core.zip" -DestinationPath "./core_temp"
          Get-ChildItem -Path "./core_temp" -Filter "sing-box.exe" -Recurse | Move-Item -Destination "./sing-box.exe"

      - name: Build Nekoray Main Application
        shell: pwsh
        run: |
          mkdir build
          cd build
          cmake .. -GNinja -DCMAKE_BUILD_TYPE=Release
          ninja

      - name: Package Final Release
        shell: pwsh
        run: |
          mkdir release_dist
          Copy-Item "./build/nekobox.exe" -Destination "./release_dist/"
          Copy-Item "./sing-box.exe" -Destination "./release_dist/"
          windeployqt --release ./release_dist/nekobox.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nekobox-AnyTLS-Edition
          path: ./release_dist/
