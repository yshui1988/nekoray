name: Build Nekoray (AnyTLS Hardcore Edition)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Qt 5.15.2
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      - name: Setup Compiler Environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja
        run: choco install ninja
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Python Injector (AnyTLS Surgery)
        run: |
          # 在 C++ 开始编译前，运行你的 Python 手术刀脚本
          # 请确保你的仓库根目录下已经创建了 inject_anytls.py 这个文件！
          python inject_anytls.py

      - name: Build C++ Dependencies
        shell: bash
        run: |
          echo ">>> 正在执行官方 C++ 依赖编译脚本..."
          bash ./libs/build_deps_all.sh

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.20'

      - name: Build Go Components
        shell: bash
        run: |
          echo ">>> 正在编译 Go 组件..."
          if [ -f "./libs/get_source.sh" ]; then bash ./libs/get_source.sh; fi
          if [ -f "./libs/build_go.sh" ]; then GOOS=windows GOARCH=amd64 bash ./libs/build_go.sh; fi

      - name: Inject 2026 Latest Sing-box Core
        shell: pwsh
        run: |
          echo ">>> 获取 2026 最新核心..."
          $tag = (Invoke-RestMethod -Uri "https://api.github.com/repos/SagerNet/sing-box/releases/latest").tag_name
          $ver = $tag.TrimStart('v')
          $url = "https://github.com/SagerNet/sing-box/releases/download/$tag/sing-box-$ver-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile "core.zip"
          Expand-Archive -Path "core.zip" -DestinationPath "./core_temp"
          Get-ChildItem -Path "./core_temp" -Filter "sing-box.exe" -Recurse | Move-Item -Destination "./sing-box.exe"

      - name: Build Nekoray Main Application
        shell: pwsh
        run: |
          echo ">>> 源码修改完毕，开始整体编译！"
          mkdir build
          cd build
          cmake .. -GNinja -DCMAKE_BUILD_TYPE=Release
          ninja

      - name: Package Final Release
        shell: pwsh
        run: |
          mkdir release_dist
          Copy-Item "./build/nekoray.exe" -Destination "./release_dist/"
          Copy-Item "./sing-box.exe" -Destination "./release_dist/"
          windeployqt --release ./release_dist/nekoray.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nekoray-AnyTLS-Edition
          path: ./release_dist/
