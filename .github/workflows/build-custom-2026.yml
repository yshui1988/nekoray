name: Build Nekoray Windows EXE (2026 Pro)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Qt 5.15.2
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      - name: Setup Compiler Environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja
        run: choco install ninja

      - name: Build Dependencies (Protobuf etc.)
        shell: pwsh
        run: |
          # 这一步就是先去“烧砖”，把 Nekoray 需要的基础库编译好
          echo ">>> 正在编译第三方依赖库..."
          cd libs/deps
          cmake -GNinja -DCMAKE_BUILD_TYPE=Release .
          ninja

      - name: Inject 2026 Latest Sing-box Core
        shell: pwsh
        run: |
          $tag = (Invoke-RestMethod -Uri "https://api.github.com/repos/SagerNet/sing-box/releases/latest").tag_name
          $ver = $tag.TrimStart('v')
          $url = "https://github.com/SagerNet/sing-box/releases/download/$tag/sing-box-$ver-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile "core.zip"
          Expand-Archive -Path "core.zip" -DestinationPath "./core_temp"
          Get-ChildItem -Path "./core_temp" -Filter "sing-box.exe" -Recurse | Move-Item -Destination "./sing-box.exe"

      - name: Build Nekoray App
        shell: pwsh
        run: |
          # 砖烧好了，现在开始盖房子（编译主程序）
          mkdir build
          cd build
          cmake .. -GNinja -DCMAKE_BUILD_TYPE=Release
          ninja

      - name: Package Windows Artifacts
        shell: pwsh
        run: |
          mkdir release_dist
          Copy-Item "./build/nekoray.exe" -Destination "./release_dist/"
          Copy-Item "./sing-box.exe" -Destination "./release_dist/"
          windeployqt --release ./release_dist/nekoray.exe

      - name: Upload Your Custom Client
        uses: actions/upload-artifact@v4
        with:
          name: Nekoray-2026-Windows-Build
          path: ./release_dist/
