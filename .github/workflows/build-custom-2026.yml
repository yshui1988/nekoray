name: Build Nekoray 2026 Custom (Latest Core)

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt 5.15
        uses: jurplel/install-qt-action@v3
        with:
          # Nekoray 必须使用 Qt5 才能编译成功
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Download Latest Sing-box Core (2026)
        shell: pwsh
        run: |
          # 自动获取最新的 sing-box 核心
          $release = (curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | ConvertFrom-Json)
          $tag = $release.tag_name
          $ver = $tag.Substring(1)
          echo "Target Core Version: $tag"
          $url = "https://github.com/SagerNet/sing-box/releases/download/$tag/sing-box-$ver-windows-amd64.zip"
          curl -L $url -o sing-box.zip
          Expand-Archive -Path sing-box.zip -DestinationPath ./latest_core
          Move-Item ./latest_core/*/sing-box.exe ./sing-box.exe

      - name: Build Nekoray
        shell: pwsh
        run: |
          mkdir build
          cd build
          # 指定使用 Qt5 的路径进行编译
          cmake .. -GNinja -DCMAKE_BUILD_TYPE=Release
          ninja

      - name: Package with 2026 Core
        shell: pwsh
        run: |
          mkdir dist
          Copy-Item ./build/nekoray.exe ./dist/
          # 把我们刚下好的 2026 最新核心塞进去
          Copy-Item ./sing-box.exe ./dist/
          # 自动打包所有 Qt 依赖
          windeployqt --release ./dist/nekoray.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nekoray-2026-Custom-Win64
          path: ./dist/*
