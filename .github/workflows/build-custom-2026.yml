name: Build Nekoray Windows EXE (2026 Pro)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Qt 5.15.2
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      - name: Setup Compiler Environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja
        run: choco install ninja

      - name: Build C++ Dependencies
        shell: bash
        run: |
          # 运行作者写好的脚本，动态生成 libs/deps 并编译 Protobuf 等依赖
          echo ">>> 正在执行官方 C++ 依赖编译脚本 (这可能需要几分钟)..."
          bash ./libs/build_deps_all.sh

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.20'

      - name: Build Go Components
        shell: bash
        run: |
          # 编译 Nekoray 必须的 Go 语言底层组件
          echo ">>> 正在拉取并编译 Go 组件..."
          if [ -f "./libs/get_source.sh" ]; then bash ./libs/get_source.sh; fi
          if [ -f "./libs/build_go.sh" ]; then GOOS=windows GOARCH=amd64 bash ./libs/build_go.sh; fi

      - name: Inject Latest Sing-box Core (2026)
        shell: pwsh
        run: |
          # 自动去抓最新的 2026 核心
          $tag = (Invoke-RestMethod -Uri "https://api.github.com/repos/SagerNet/sing-box/releases/latest").tag_name
          $ver = $tag.TrimStart('v')
          $url = "https://github.com/SagerNet/sing-box/releases/download/$tag/sing-box-$ver-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile "core.zip"
          Expand-Archive -Path "core.zip" -DestinationPath "./core_temp"
          Get-ChildItem -Path "./core_temp" -Filter "sing-box.exe" -Recurse | Move-Item -Destination "./sing-box.exe"

      - name: Build Nekoray App
        shell: pwsh
        run: |
          # 依赖库全都准备好了，开始盖主程序！
          mkdir build
          cd build
          cmake .. -GNinja -DCMAKE_BUILD_TYPE=Release
          ninja

      - name: Package Windows Artifacts
        shell: pwsh
        run: |
          mkdir release_dist
          Copy-Item "./build/nekoray.exe" -Destination "./release_dist/"
          Copy-Item "./sing-box.exe" -Destination "./release_dist/"
          windeployqt --release ./release_dist/nekoray.exe

      - name: Upload Your Custom Client
        uses: actions/upload-artifact@v4
        with:
          name: Nekoray-2026-Windows-Build
          path: ./release_dist/
