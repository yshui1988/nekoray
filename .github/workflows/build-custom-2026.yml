name: Build Nekoray Windows EXE (2026 Turbo)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Download Official Nekoray GUI (Stable Release)
        shell: pwsh
        run: |
          echo ">>> 正在获取官方稳定版客户端壳子..."
          $url = "https://github.com/MatsuriDayo/nekoray/releases/download/4.0.1/nekoray-4.0.1-2024-12-12-windows64.zip"
          Invoke-WebRequest -Uri $url -OutFile "nekoray.zip"
          Expand-Archive -Path "nekoray.zip" -DestinationPath "./Nekoray_Pro"

      - name: Download 2026 Latest Sing-box Engine
        shell: pwsh
        run: |
          echo ">>> 正在抓取 2026 年最新底层核心..."
          $tag = (Invoke-RestMethod -Uri "https://api.github.com/repos/SagerNet/sing-box/releases/latest").tag_name
          $ver = $tag.TrimStart('v')
          $url = "https://github.com/SagerNet/sing-box/releases/download/$tag/sing-box-$ver-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile "core.zip"
          Expand-Archive -Path "core.zip" -DestinationPath "./core_temp"
          Get-ChildItem -Path "./core_temp" -Filter "sing-box.exe" -Recurse | Move-Item -Destination "./sing-box.exe"

      - name: Surgical Core Transplant
        shell: pwsh
        run: |
          echo ">>> 正在执行核心替换手术..."
          cd ./Nekoray_Pro/nekoray
          
          # 摘除老旧的内脏
          if (Test-Path "nekoray_core.exe") { Remove-Item "nekoray_core.exe" -Force }
          
          # 植入 2026 最新核心，并伪装成 Nekoray 需要的名字
          Copy-Item "../../sing-box.exe" -Destination "nekoray_core.exe" -Force
          Copy-Item "../../sing-box.exe" -Destination "sing-box.exe" -Force
          echo "替换完成！"

      - name: Upload 2026 Custom Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nekoray-2026-Turbo-Windows
          path: ./Nekoray_Pro/nekoray/
