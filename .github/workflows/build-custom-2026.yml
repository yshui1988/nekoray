name: Build Nekoray Windows EXE (2026 Edition)

on:
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: windows-2022 # 强制使用 Windows 环境，不再用 Linux Docker

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt 5.15.2
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      - name: Setup MSVC & Ninja
        uses: ilammy/msvc-dev-cmd@v1

      - name: Download 2026 Sing-box Core
        shell: pwsh
        run: |
          # 自动抓取 2026 年最新的核心
          $tag = (Invoke-RestMethod -Uri "https://api.github.com/repos/SagerNet/sing-box/releases/latest").tag_name
          $ver = $tag.TrimStart('v')
          $url = "https://github.com/SagerNet/sing-box/releases/download/$tag/sing-box-$ver-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile "core.zip"
          Expand-Archive -Path "core.zip" -DestinationPath "./core_temp"
          Get-ChildItem -Path "./core_temp" -Filter "sing-box.exe" -Recurse | Move-Item -Destination "./sing-box.exe"

      - name: Build Nekoray
        shell: pwsh
        run: |
          mkdir build
          cd build
          cmake .. -GNinja -DCMAKE_BUILD_TYPE=Release
          ninja

      - name: Package Release
        shell: pwsh
        run: |
          mkdir out
          Copy-Item "./build/nekoray.exe" -Destination "./out/"
          Copy-Item "./sing-box.exe" -Destination "./out/"
          # 自动补全 Windows 下的 DLL 运行库
          windeployqt --release ./out/nekoray.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nekoray-Windows-2026
          path: ./out/
